<!DOCTYPE html>
<html>
<head>
<title>B.Tech Quiz Login</title>

<style>

body{
    background:#ffffff;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:rgb(255, 255, 255);
}

.login-box{
    background:rgb(136, 136, 137);
    padding:40px;
    border-radius:10px;
    width:300px;
    text-align:center;
}

input{
    width:90%;
    padding:10px;
    margin:10px;
    border:none;
    border-radius:5px;
}

button{
    padding:10px 20px;
    background:#5e5e5e;
    border:none;
    color:white;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#929292;
}

</style>
</head>

<body>

<div class="login-box">
<h2>B.Tech Quiz Login</h2>

<input type="text" id="username" placeholder="Enter Username"><br>
<input type="password" id="password" placeholder="Enter Password"><br>

<button onclick="login()">Login</button>

<p id="error"></p>

</div>

<script>

function login(){

let user = document.getElementById("username").value;
let pass = document.getElementById("password").value;

if(user=="group5" && pass=="1234"){
window.location="quiz.html";
}
else{
document.getElementById("error").innerText="Invalid Login!";
}

}

</script>

</body>
</html>
