<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Photo Gallery</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f4f4f4;
}

header {
    text-align: center;
    padding: 20px;
    background: #222;
    color: white;
    font-size: 28px;
}

.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 15px;
    padding: 20px;
}

.gallery img {
    width: 100%;
    height: 250px;
    object-fit: cover;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.3s;
}

.gallery img:hover {
    transform: scale(1.05);
}

/* Lightbox */
.lightbox {
    display: none;
    position: fixed;
    z-index: 1000;
    padding-top: 60px;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.9);
}

.lightbox img {
    display: block;
    margin: auto;
    max-width: 80%;
    max-height: 80%;
    border-radius: 10px;
    animation: zoom 0.3s ease;
}

@keyframes zoom {
    from {transform: scale(0.7);}
    to {transform: scale(1);}
}

.close {
    position: absolute;
    top: 20px;
    right: 40px;
    font-size: 40px;
    color: white;
    cursor: pointer;
}

.nav {
    position: absolute;
    top: 50%;
    font-size: 50px;
    color: white;
    cursor: pointer;
    user-select: none;
    transform: translateY(-50%);
}

.prev {
    left: 30px;
}

.next {
    right: 30px;
}

.nav:hover, .close:hover {
    color: #ccc;
}
</style>
</head>

<body>

<header>My Photo Gallery</header>

<div class="gallery">
    <img src="https://picsum.photos/800/600?random=1">
    <img src="https://picsum.photos/800/600?random=2">
    <img src="https://picsum.photos/800/600?random=3">
    <img src="https://picsum.photos/800/600?random=4">
    <img src="https://picsum.photos/800/600?random=5">
    <img src="https://picsum.photos/800/600?random=6">
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
    <span class="close" onclick="closeLightbox()">&times;</span>
    <span class="nav prev" onclick="changeImage(-1)">&#10094;</span>
    <img id="lightbox-img">
    <span class="nav next" onclick="changeImage(1)">&#10095;</span>
</div>

<script>
const images = document.querySelectorAll(".gallery img");
const lightbox = document.getElementById("lightbox");
const lightboxImg = document.getElementById("lightbox-img");

let currentIndex = 0;

images.forEach((img, index) => {
    img.addEventListener("click", () => {
        currentIndex = index;
        showImage();
        lightbox.style.display = "block";
    });
});

function showImage() {
    lightboxImg.src = images[currentIndex].src;
}

function closeLightbox() {
    lightbox.style.display = "none";
}

function changeImage(direction) {
    currentIndex += direction;

    if (currentIndex < 0) {
        currentIndex = images.length - 1;
    }

    if (currentIndex >= images.length) {
        currentIndex = 0;
    }

    showImage();
}

/* Keyboard Support */
document.addEventListener("keydown", function(event) {
    if (lightbox.style.display === "block") {
        if (event.key === "ArrowRight") {
            changeImage(1);
        }
        if (event.key === "ArrowLeft") {
            changeImage(-1);
        }
        if (event.key === "Escape") {
            closeLightbox();
        }
    }
});
</script>

</body>
</html>
